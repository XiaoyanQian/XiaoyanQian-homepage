---
layout: default
---
<article class="case">
  <p class="badge badge-{{ page.evidence_class }}">{{ page.evidence_type }}</p>
  <h1>{{ page.title }}</h1>
  {% if page.decision_state %}
  <p class="decision-state"><strong>Post-market decision state:</strong> {{ page.decision_state }}</p>
  {% endif %}
  {{ content }}
  <p class="backlink"><a href="{{ '/portfolio/' | relative_url }}">← Back to Governance Portfolio</a></p>
</article>
